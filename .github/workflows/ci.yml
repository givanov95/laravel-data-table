name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test

  lint:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # php-cs-fixer се пуска на 8.4 (минималната поддържана версия)
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Lint (php-cs-fixer dry-run)
        run: composer lint

  frontend:
    name: Frontend (typecheck + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # package-lock.json не се commit-ва (виж .gitignore), затова
      # npm install вместо npm ci — аналогично на composer install по-горе
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
